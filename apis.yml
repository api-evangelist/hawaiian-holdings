aid: hawaiian-holdings
name: Hawaiian Holdings
description: >-
  Hawaiian Holdings was the parent company of Hawaiian Airlines, the
  largest and longest-serving airline of Hawaii, providing scheduled
  passenger service to destinations across the Pacific. In 2024 the
  company combined with Alaska Air Group, and Hawaiian Holdings became
  a wholly-owned subsidiary of Alaska Air Group. No public developer
  portal or production-facing APIs are advertised.
